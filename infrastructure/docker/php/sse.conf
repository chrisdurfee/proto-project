; Pool Configuration for PHP-FPM
; sse pool - handles long-lived Server-Sent Event streams (paths ending in /sync)
;
; Why a dedicated pool:
; SSE streams hold a worker for their entire lifetime. If they share the [www]
; pool, a burst of stream reconnections can exhaust pm.max_children and starve
; regular API traffic (including /health.php).
;
; Apache routes /sync$ requests to this pool via SetHandler in the vhost configs.

[sse]

user = www-data
group = www-data

; Listen on a separate TCP port so Apache can route SSE traffic here
listen = 127.0.0.1:9001
listen.backlog = 4096
listen.allowed_clients = 127.0.0.1

; PROCESS MANAGER CONFIGURATION
; SSE workers spend almost all their time blocked on Redis subscribe(),
; so 'dynamic' lets us scale up to peak concurrent stream count without
; over-allocating during quiet periods.
pm = dynamic

; Cap concurrent SSE streams. Per Proto's REDIS_EVENTS docs:
;   pm.max_children = peak concurrent SSE clients * 1.2
; 60 is a safe starting point; raise after observing peaks via
;   redis-cli --scan --pattern 'sse:connection:*' | wc -l
pm.max_children = 60
pm.start_servers = 4
pm.min_spare_servers = 4
pm.max_spare_servers = 16

; Recycle workers periodically as a defence-in-depth against Redis client
; state drift on long-running processes.
pm.max_requests = 500

; Idle workers can hang around longer than the www pool — spawning is
; relatively expensive vs. just keeping a few warm.
pm.process_idle_timeout = 60s

; Status / ping endpoints (separate paths so they don't collide with [www])
pm.status_path = /fpm-sse-status
ping.path = /fpm-sse-ping

; HARD BACKSTOP for stuck streams.
;
; Proto's RedisServerEvents bounds every stream to sse.maxDuration (default 300s)
; and calls set_time_limit(maxDuration + shutdownGrace). request_terminate_timeout
; is the FPM-level safety net that fires if the script somehow ignores both —
; it MUST be greater than sse.maxDuration so healthy streams aren't killed
; mid-flight, but bounded so a stuck worker can't camp forever.
;
; Sized for sse.maxDuration = 300s + 30s grace = 330s.
; If you raise sse.maxDuration in common/Config/.env, raise this too.
request_terminate_timeout = 330s

; Dump a backtrace for any stream still running after this long. Helps
; identify the rare case where a stream legitimately needs to live this long
; vs. one that's actually stuck.
request_slowlog_timeout = 60s
slowlog = /proc/self/fd/2

rlimit_files = 65535
rlimit_core = 0

chdir = /var/www/html

catch_workers_output = yes
decorate_workers_output = no

clear_env = no

security.limit_extensions = .php

env[HOSTNAME] = $HOSTNAME
env[PATH] = /usr/local/bin:/usr/bin:/bin
env[TMP] = /tmp
env[TMPDIR] = /tmp
env[TEMP] = /tmp

env[DB_HOST] = $DB_HOST
env[DB_PORT] = $DB_PORT
env[DB_DATABASE] = $DB_DATABASE
env[DB_USERNAME] = $DB_USERNAME
env[DB_PASSWORD] = $DB_PASSWORD
env[REDIS_HOST] = $REDIS_HOST
env[REDIS_PORT] = $REDIS_PORT
env[REDIS_PASSWORD] = $REDIS_PASSWORD
env[APP_ENV] = $APP_ENV

php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; SSE-specific PHP runtime tuning.
; max_execution_time matches request_terminate_timeout so the two limits agree;
; Proto's set_time_limit() at runtime is what actually bounds individual streams.
php_value[max_execution_time] = 330
php_value[max_input_time] = 30
php_value[memory_limit] = 256M
php_value[post_max_size] = 8M
php_value[upload_max_filesize] = 8M

; Streaming requirements — must NOT buffer or compress SSE output
php_flag[output_buffering] = off
php_admin_value[output_buffering] = 0
php_admin_value[zlib.output_compression] = off
php_flag[implicit_flush] = on
