<VirtualHost *:443>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/localhost.crt
    SSLCertificateKeyFile /etc/ssl/private/localhost.key

    # HTTP/2 Protocol Support
    Protocols h2 http/1.1

    # Modern SSL Configuration
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder on

    <Directory /var/www/html/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # PHP-FPM Proxy for .php files
        <FilesMatch \.php$>
            SetHandler "proxy:fcgi://127.0.0.1:9000"
        </FilesMatch>

        # Override handler for long-lived SSE streams (paths ending in /sync) so
        # they hit the dedicated [sse] FPM pool on port 9001 and cannot starve
        # the [www] pool. THE_REQUEST is the immutable original request line and
        # is preserved across the .htaccess internal rewrite that turns
        # /api/.../sync into /api/index.php — so this routes correctly even
        # though all PHP execution funnels through index.php.
        <If "%{THE_REQUEST} =~ m#\s\S*/sync(\?\S*)?\s#">
            SetHandler "proxy:fcgi://127.0.0.1:9001"
        </If>

        # Enable .htaccess
        <IfModule mod_rewrite.c>
            RewriteEngine On
        </IfModule>
    </Directory>

    # Match the SSE pool's request_terminate_timeout so Apache doesn't drop
    # the FastCGI connection before the worker finishes a long stream.
    <Proxy "fcgi://127.0.0.1:9001">
        ProxySet timeout=330
    </Proxy>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/ssl_access.log combined

    # Security Headers (same as non-SSL)
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
    Header always set X-Permitted-Cross-Domain-Policies "none"

    # HSTS (HTTP Strict Transport Security) - 1 year
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # CSP for development (relaxed for local)
    Header always set Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' https: http: data: blob:; frame-ancestors 'self';"

    # Compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
    </IfModule>

    # Browser Caching
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpg "access plus 1 year"
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/gif "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/svg+xml "access plus 1 year"
        ExpiresByType image/webp "access plus 1 year"
        ExpiresByType image/avif "access plus 1 year"
        ExpiresByType image/heic "access plus 1 year"
        ExpiresByType image/heif "access plus 1 year"
        ExpiresByType image/bmp "access plus 1 year"
        ExpiresByType image/tiff "access plus 1 year"
        ExpiresByType image/jxl "access plus 1 year"
        ExpiresByType application/json "access plus 1 hour"
        ExpiresByType application/pdf "access plus 1 year"
        ExpiresByType font/woff2 "access plus 1 year"
        ExpiresByType font/woff "access plus 1 year"
        ExpiresByType font/ttf "access plus 1 year"
        ExpiresByType font/otf "access plus 1 year"
        ExpiresByType text/css "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
        ExpiresByType application/x-javascript "access plus 1 month"
        ExpiresByType text/javascript "access plus 1 month"
    </IfModule>
</VirtualHost>
